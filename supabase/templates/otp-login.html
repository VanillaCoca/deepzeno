<!-- ZENO OTP login email. Paste into BOTH Supabase templates:
     Auth → Email Templates → "Confirm signup" AND "Magic Link".
     signInWithOtp sends "Confirm signup" to new users and "Magic Link" to
     returning users — the app's login form expects a 6-digit code either way,
     so both templates must carry {{ .Token }}. -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f6f6f4;padding:32px 16px;">
  <tr>
    <td align="center">
      <table role="presentation" width="420" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border:1px solid #e5e5e0;border-radius:12px;padding:36px 32px;font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;">
        <tr>
          <td align="center" style="padding-bottom:10px;">
            <img alt="ZENO" height="51" src="https://app.deepzeno.ai/zeno-logo-clean.png" style="display:block;" width="44" />
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:20px;font-weight:600;letter-spacing:2px;color:#1a1a1a;padding-bottom:6px;">
            ZENO
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:12px;color:#8a8a85;padding-bottom:28px;">
            把对话，凝成判断。
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:14px;color:#3d3d3a;padding-bottom:16px;">
            输入这个验证码，完成登录：
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:16px;">
            <div style="display:inline-block;background-color:#f4f4f0;border-radius:10px;padding:14px 28px;font-size:30px;font-weight:600;letter-spacing:10px;color:#1a1a1a;font-family:'SF Mono',Consolas,Menlo,monospace;">{{ .Token }}</div>
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:12px;color:#8a8a85;line-height:1.7;">
            验证码 10 分钟内有效。<br />
            不是你在登录？忽略这封邮件即可，你的账户不会有任何变化。
          </td>
        </tr>
        <tr>
          <td align="center" style="border-top:1px solid #efefe9;margin-top:24px;padding-top:20px;font-size:11px;color:#b0b0aa;line-height:1.6;">
            Enter this code to sign in to ZENO. It expires in 10 minutes.<br />
            If you didn't request it, you can safely ignore this email.
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
